<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMON'S STRATEGY AI - FINAL MASTER</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d4ff; --dark: #010105; --red: #ff4757; --green: #00ff88; }
        body { background-color: var(--dark); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; color: white; padding: 10px; overflow-x: hidden; }
        
        /* 1. Live TradingView Chart */
        #chart-box { width: 100%; height: 260px; border: 1.5px solid var(--gold); border-radius: 15px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 0 25px rgba(212, 175, 55, 0.2); }

        .ai-container { background: rgba(10, 10, 25, 0.98); border-radius: 30px; padding: 20px; border: 2.5px solid var(--sky); box-shadow: 0 0 50px rgba(0, 212, 255, 0.3); width: 340px; text-align: center; }
        
        /* 2. Your Favorite Sky Orb (গোলক) */
        .ai-orb { width: 115px; height: 115px; border-radius: 50%; background: radial-gradient(circle, var(--sky), #005a6e, #000); margin: 15px auto; box-shadow: 0 0 40px var(--sky); animation: pulse 2s infinite ease-in-out; cursor: pointer; border: 3px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; position: relative; }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.4); } }
        
        .listening-active { border: 4px solid var(--red) !important; box-shadow: 0 0 60px var(--red) !important; animation: shake 0.2s infinite !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }

        /* 3. Signal Styles (Up/Down Arrows) */
        #signal-display { font-size: 26px; font-weight: bold; margin: 15px 0; min-height: 55px; }
        .up-signal { color: var(--green); text-shadow: 0 0 25px var(--green); animation: bounceUp 0.6s infinite alternate; }
        .down-signal { color: var(--red); text-shadow: 0 0 25px var(--red); animation: bounceDown 0.6s infinite alternate; }
        @keyframes bounceUp { from { transform: translateY(0); } to { transform: translateY(-8px); } }
        @keyframes bounceDown { from { transform: translateY(0); } to { transform: translateY(8px); } }

        /* 4. Controls & Inputs */
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; border: 1.5px solid var(--gold); background: #000; color: #fff; font-size: 14px; outline: none; }
        .main-btn { background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 17px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        .status-bar { display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    </style>
</head>
<body>

    <div id="chart-box"><div id="trading-widget"></div></div>

    <div class="ai-container">
        <div class="status-bar">
            <span>RSI: <b>STABLE</b></span>
            <span>SUMON AI v7.0</span>
            <span>DATA: <b>LIVE</b></span>
        </div>

        <div class="ai-orb" id="ai-orb" onclick="startListening()">
            <div style="font-size: 10px; font-weight: bold; color: white;">SPEAK<br>NOW</div>
        </div>
        
        <div id="signal-display">সিস্টেম প্রস্তুত</div>
        
        <select id="market-selector" onchange="changeMarket()">
            <option value="FX:EURUSD">EUR/USD (Pocket Option)</option>
            <option value="FX:GBPUSD">GBP/USD (Pocket Option)</option>
            <option value="FX:USDJPY">USD/JPY (Pocket Option)</option>
            <option value="TVC:GOLD">GOLD (XAU/USD)</option>
            <option value="BINANCE:BTCUSDT">BITCOIN (Real)</option>
            <option value="BINANCE:ETHUSDT">ETHEREUM (Real)</option>
            <option value="NASDAQ:AAPL">APPLE STOCK</option>
            <option value="NASDAQ:TSLA">TESLA STOCK</option>
            <option value="FX:EURJPY">EUR/JPY</option>
            <option value="FX:AUDUSD">AUD/USD</option>
        </select>

        <button class="main-btn" onclick="runSumonScript()">GET 5-MIN SIGNAL</button>
        
        <div style="margin-top: 15px; font-size: 10px; color: #666;">© SUMON'S STRATEGY AI COLLABORATION</div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let symbol = "FX:EURUSD";
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD';

        function initChart(s) {
            new TradingView.widget({
                "width": "100%", "height": 260, "symbol": s,
                "interval": "5", "theme": "dark", "style": "1",
                "locale": "en", "hide_top_toolbar": true, "container_id": "trading-widget"
            });
        }
        initChart(symbol);

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function changeMarket() {
            symbol = document.getElementById('market-selector').value;
            initChart(symbol);
            speak("সুমন ভাই, আপনার পছন্দের মার্কেট " + symbol + " কানেক্ট করা হয়েছে।");
        }

        // আপনার শিখিয়ে দেওয়া রিপ্লাই এবং ৫ মিনিটের সেশন
        function runSumonScript() {
            const display = document.getElementById('signal-display');
            display.innerHTML = '<span style="font-size:16px; color:var(--sky)">এনালাইসিস চলছে...</span>';
            
            // আপনার বলা স্ক্রিপ্ট
            speak("সুমন ভাইয়ের নির্দেশে আমি এবং সুমন ভাই দুজনে মিলে এখন মার্কেট রিয়েল টাইম এনালাইজ করছি। আমরা প্রতিদিন এইভাবে ৫ থেকে ১০ হাজার টাকা পর্যন্ত প্রফিট করছি। মনে রাখবেন, ইনকাম করলেই যে ইনকাম দেখে সো-অফ করতে হবে তেমন কিছু না, বরং সঠিক রিস্ক ম্যানেজমেন্ট মেনে চলাই আসল ট্রেডারের কাজ।");

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                if(isUp) {
                    display.innerHTML = '<span class="up-signal">BUY UP ⬆️</span>';
                    speak("সুমন ভাইয়ের এনালাইসিস শেষ। পরবর্তী ৫ মিনিটের জন্য উপরে ট্রেড নিন। ইনশাআল্লাহ প্রফিট হবে।");
                } else {
                    display.innerHTML = '<span class="down-signal">SELL DOWN ⬇️</span>';
                    speak("সুমন ভাইয়ের এনালাইসিস শেষ। পরবর্তী ৫ মিনিটের জন্য নিচে ট্রেড নিন। রিস্ক ম্যানেজমেন্ট ফলো করুন।");
                }
            }, 8000);
        }

        function startListening() {
            try { 
                recognition.start(); 
                document.getElementById('ai-orb').classList.add('listening-active'); 
            } catch(e) {}
        }

        recognition.onresult = (e) => {
            const msg = e.results[0][0].transcript.toLowerCase();
            // এআই এখানে আপনার কথা অনুযায়ী রিপ্লাই দিবে
            if(msg.includes("কেমন আছো")) {
                speak("আমি ভালো আছি সুমন ভাই। ট্রেডিং এর জন্য আপনার সব মার্কেট এনালাইসিস করে আমি রেডি।");
            } else if(msg.includes("সিগন্যাল দাও")) {
                runSumonScript();
            } else {
                speak("সুমন ভাই, আপনি বললেন " + msg + "। আপনার প্রতিটি নির্দেশ আমি পালন করছি।");
            }
        };

        recognition.onend = () => document.getElementById('ai-orb').classList.remove('listening-active');

        // স্বাগতম বার্তা
        window.onload = () => setTimeout(() => speak("সুমনস স্ট্র্যাটেজি এআই প্রো-তে স্বাগতম। আমি এবং সুমন ভাই মিলে আপনাকে প্রফিট করিয়ে দিতে প্রস্তুত।"), 1000);
    </script>
</body>
</html>
